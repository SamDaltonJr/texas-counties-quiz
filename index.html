<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texas County Trainer — 254</title>
<meta name="description" content="Learn all 254 Texas counties by name and location, one region at a time.">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Hanken+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { -webkit-text-size-adjust:100%; text-size-adjust:100%; }
body {
  font-family:'Hanken Grotesk',sans-serif;
  background:
    radial-gradient(120% 80% at 80% -10%, #2a2116 0%, transparent 55%),
    radial-gradient(120% 90% at -10% 110%, #1d2622 0%, transparent 55%),
    #120F0B;
  color:#ECE3D6; min-height:100%; padding:26px 18px;
  -webkit-tap-highlight-color:transparent;
}
.tct {
  --line:#362E24; --muted:#9C9082; --faint:#6E6457; --accent:#E08544;
  width:100%; max-width:1120px; min-width:0; margin:0 auto; background:rgba(33,28,21,.55); backdrop-filter:blur(2px);
  border:1px solid #2a241c; border-radius:18px; padding:26px;
}
.tct-head { display:flex; justify-content:space-between; align-items:flex-end; gap:18px; flex-wrap:wrap; }
.tct-title { display:flex; align-items:baseline; gap:14px; animation:rise .6s cubic-bezier(.2,.7,.2,1) both; }
.tct-num { font-family:'Fraunces',serif; font-weight:900; font-size:60px; line-height:.82;
  background:linear-gradient(160deg,#F2A864,#C9692C); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:-2px; }
.tct-sub h1 { font-family:'Fraunces',serif; font-weight:600; font-size:22px; letter-spacing:-.3px; }
.tct-sub p { color:var(--muted); font-size:12.5px; margin-top:2px; }
.tct-prog { text-align:right; animation:rise .6s .08s cubic-bezier(.2,.7,.2,1) both; }
.tct-prog .pn { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); }
.tct-prog .pn b { color:#ECE3D6; }
.tct-bar { width:170px; height:6px; border-radius:6px; background:#2a241c; margin-top:6px; overflow:hidden; border:1px solid #322a20; }
.tct-bar i { display:block; height:100%; width:0; background:linear-gradient(90deg,#5E8C6A,#7FB890); border-radius:6px; transition:width .5s; }
.tct-modes { display:flex; gap:6px; margin:20px 0 12px; background:#1C1812; padding:5px; border-radius:11px; border:1px solid #2a241c; width:fit-content; }
.tct-mode { display:flex; align-items:center; gap:7px; border:0; background:transparent; color:var(--muted); font-family:inherit; font-size:13px; font-weight:600; padding:9px 15px; border-radius:8px; cursor:pointer; transition:.18s; }
.tct-mode:hover { color:#ECE3D6; }
.tct-mode.on { background:#221D16; color:var(--accent); box-shadow:0 1px 0 #3a3024 inset, 0 6px 14px -10px #000; }
.tct-chips { display:flex; gap:7px; overflow-x:auto; padding-bottom:7px; margin-bottom:14px; }
.tct-chip { flex:0 0 auto; border:1px solid var(--line); background:#1C1812; color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; padding:7px 12px; border-radius:20px; cursor:pointer; transition:.15s; white-space:nowrap; display:flex; align-items:center; gap:7px; }
.tct-chip:hover { border-color:#4a3f30; color:#ECE3D6; }
.tct-chip.on { background:var(--accent); border-color:var(--accent); color:#1c130a; }
.tct-chip .dot { width:8px; height:8px; border-radius:50%; }
.tct-chip .ct { font-family:'DM Mono',monospace; font-size:10.5px; opacity:.8; }
.tct-chip .add, .tct-chip .rm { display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%; font-size:12px; font-weight:800; line-height:1; flex:0 0 auto; margin-left:-2px; }
.tct-chip .add { background:var(--accent); color:#1c130a; }
.tct-chip:hover .add { filter:brightness(1.12); }
.tct-chip.on .rm { background:rgba(28,19,10,.22); color:#1c130a; font-size:10px; }
.tct-stage { display:flex; gap:18px; align-items:stretch; min-width:0; }
.tct-mapwrap { flex:1 1 60%; min-width:0; background:#1C1812; border:1px solid #2a241c; border-radius:13px; padding:10px; }
.tct-mapwrap svg { width:100%; height:auto; max-width:100%; display:block; }
.tct-co { transition:fill .25s, opacity .2s; }
.tct-co.dim { opacity:.5; pointer-events:none; }
.tct-co.clickable { cursor:pointer; }
.tct-co.ring { animation:pulse 1.4s ease-in-out infinite; }
.tct-lab { font-family:'DM Mono',monospace; font-size:11px; fill:#fff; paint-order:stroke; stroke:#15120E; stroke-width:3.4px; stroke-linejoin:round; pointer-events:none; }
.tct-panel { flex:1 1 40%; min-width:240px; display:flex; flex-direction:column; gap:12px; }
.tct-card { background:#221D16; border:1px solid #322a20; border-radius:13px; padding:16px; }
.tct-eyebrow { font-family:'DM Mono',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--faint); }
.tct-prompt { font-family:'Fraunces',serif; font-size:30px; font-weight:600; letter-spacing:-.5px; margin-top:6px; line-height:1.05; }
.tct-prompt small { font-family:'Hanken Grotesk'; font-size:13px; font-weight:500; color:var(--muted); display:block; margin-top:8px; letter-spacing:0; }
.tct-opts { display:grid; gap:8px; margin-top:12px; }
.tct-opt { text-align:left; border:1px solid var(--line); background:#1C1812; color:#ECE3D6; font-family:inherit; font-size:14.5px; font-weight:600; padding:12px 14px; border-radius:10px; cursor:pointer; transition:.14s; display:flex; justify-content:space-between; align-items:center; }
.tct-opt:hover:not(:disabled) { border-color:var(--accent); transform:translateX(2px); }
.tct-opt:disabled { cursor:default; }
.tct-opt.correct { background:#26392f; border-color:#74B894; color:#bfe6cf; }
.tct-opt.wrong { background:#3a221e; border-color:#CB5A48; color:#f0b6ab; }
.tct-fb { font-size:14px; font-weight:600; padding:11px 14px; border-radius:10px; margin-top:14px; }
.tct-fb.correct { background:#22352b; color:#9ad6b3; border:1px solid #355f48; }
.tct-fb.wrong { background:#34201d; color:#eaa99d; border:1px solid #5e342d; }
.tct-recall { display:flex; gap:8px; margin-top:12px; }
.tct-input { flex:1 1 auto; min-width:0; border:1px solid var(--line); background:#1C1812; color:#ECE3D6; font-family:inherit; font-size:16px; font-weight:600; padding:12px 14px; border-radius:10px; outline:none; transition:.14s; }
.tct-input::placeholder { color:var(--faint); font-weight:500; }
.tct-input:focus { border-color:var(--accent); }
.tct-input:disabled { opacity:.75; }
.tct-submit { flex:0 0 auto; border:1px solid var(--accent); background:var(--accent); color:#1c130a; font-family:inherit; font-size:14px; font-weight:700; padding:0 18px; border-radius:10px; cursor:pointer; transition:.14s; }
.tct-submit:hover:not(:disabled) { filter:brightness(1.08); }
.tct-submit:disabled { opacity:.5; cursor:default; }
.tct-stats { display:flex; gap:10px; }
.tct-stat { flex:1; background:#1C1812; border:1px solid #2a241c; border-radius:11px; padding:11px 12px; }
.tct-stat .v { font-family:'Fraunces',serif; font-size:24px; font-weight:600; }
.tct-stat .v small { color:var(--faint); font-size:16px; }
.tct-stat .l { font-size:11px; color:var(--muted); margin-top:1px; }
.tct-explain { color:var(--muted); font-size:13.5px; line-height:1.55; margin-top:10px; }
.tct-explain b { color:#ECE3D6; font-weight:600; }
.tct-legend { display:flex; gap:14px; flex-wrap:wrap; }
.tct-legend span { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted); font-family:'DM Mono',monospace; }
.tct-legend i { width:11px; height:11px; border-radius:3px; display:inline-block; }
.tct-pin { font-family:'DM Mono',monospace; font-size:11px; color:var(--faint); margin-top:10px; }
.tct-reset { margin-top:auto; align-self:flex-start; display:flex; align-items:center; gap:7px; background:transparent; border:1px solid var(--line); color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; padding:8px 13px; border-radius:9px; cursor:pointer; transition:.15s; }
.tct-reset:hover { color:#ECE3D6; border-color:#5a4030; }
@keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
/* hide horizontal scrollbar on the region chip row */
.tct-chips { -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tct-chips::-webkit-scrollbar { display:none; }

/* On touch devices, neutralise sticky :hover states that get stuck after a tap */
@media (hover:none) {
  .tct-opt:hover:not(:disabled) { transform:none; border-color:var(--line); }
  .tct-chip:hover { border-color:var(--line); color:var(--muted); }
  .tct-mode:hover { color:var(--muted); }
  .tct-reset:hover { color:var(--muted); border-color:var(--line); }
}

@media (max-width:760px) {
  body { padding:12px 10px; }
  .tct { padding:16px 14px; border-radius:14px; }
  .tct-head { gap:12px; }
  .tct-num { font-size:46px; }
  .tct-sub h1 { font-size:19px; }
  /* progress bar spans full width under the title */
  .tct-prog { width:100%; text-align:left; }
  .tct-bar { width:100%; }
  /* mode switch becomes a full-width segmented control */
  .tct-modes { width:100%; margin:16px 0 10px; }
  .tct-mode { flex:1; justify-content:center; padding:11px 6px; white-space:nowrap; }
  .tct-stage { flex-direction:column; gap:14px; }
  .tct-panel { min-width:0; }
  .tct-prompt { font-size:26px; }
  /* comfortable touch targets for answer buttons */
  .tct-opt { min-height:50px; font-size:15px; padding:13px 14px; }
  .tct-opt:hover:not(:disabled) { transform:none; }
}

@media (max-width:430px) {
  .tct-num { font-size:38px; }
  .tct-sub h1 { font-size:17px; }
  .tct-sub p { font-size:11.5px; }
  .tct-mode { font-size:12px; }
  .tct-prompt { font-size:23px; }
  .tct-stat .v { font-size:21px; }
}

</style>

const counties = DATA.counties;
const byFips = {}; counties.forEach(c => byFips[c.fips] = c);

const REGIONS = ["Panhandle","South Plains & West","Trans-Pecos & Far West","North Texas (DFW)","East Texas (Piney Woods)","Central & Hill Country","Gulf Coast","South Texas"];
const REGION_COLORS = {"Panhandle":"#C97B4A","South Plains & West":"#D2A24B","Trans-Pecos & Far West":"#A8693E","North Texas (DFW)":"#7FA178","East Texas (Piney Woods)":"#5E8C6A","Central & Hill Country":"#CC8B63","Gulf Coast":"#6E9DA6","South Texas":"#BE7468"};
const SHORT = {"Panhandle":"Panhandle","South Plains & West":"South Plains","Trans-Pecos & Far West":"Trans-Pecos","North Texas (DFW)":"North / DFW","East Texas (Piney Woods)":"East / Piney","Central & Hill Country":"Hill Country","Gulf Coast":"Gulf Coast","South Texas":"South Texas"};
const C_UNSEEN="#2B261F", C_LEARN="#9A6A38", C_MASTER="#5E8C6A", C_DIM="#1B1712", C_ACCENT="#E08544", C_COR="#74B894", C_WRONG="#CB5A48";
const MASTER_STREAK = 3, KEY = "tx-county-stats-v1";
const SVGNS = "http://www.w3.org/2000/svg";
const isTouch = (window.matchMedia && window.matchMedia("(hover:none)").matches) || ("ontouchstart" in window);

function lighten(hex, amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt); return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }
function shuffle(a){ const x=a.slice(); for(let i=x.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [x[i],x[j]]=[x[j],x[i]]; } return x; }

const S = { mode:"explore", regions:[], stats:{}, target:null, options:[], feedback:null, reveal:null, session:{correct:0,total:0}, hovered:null, pinned:null };
let T = null;
const els = {};
let labelG, panelEl, chipsEl, modesEl, progNum, progBar;

function inScope(c){ return S.regions.length===0 || S.regions.includes(c.region); }
function poolFor(){ return S.regions.length===0 ? counties : counties.filter(c=>S.regions.includes(c.region)); }
function masteredCount(){ let n=0; for(const f in S.stats) if((S.stats[f].streak||0)>=MASTER_STREAK) n++; return n; }
function isMastered(f){ const s=S.stats[f]; return s && (s.streak||0)>=MASTER_STREAK; }

function pickTarget(pool, exclude){
  const cand = pool.length>1 ? pool.filter(c=>c.fips!==exclude) : pool;
  const w = c => { const s=S.stats[c.fips]; if(!s || s.c+s.w===0) return 6; if((s.streak||0)>=MASTER_STREAK) return 0.35; return 3+(s.w||0); };
  const total = cand.reduce((a,c)=>a+w(c),0); let r=Math.random()*total;
  for(const c of cand){ r-=w(c); if(r<=0) return c; }
  return cand[cand.length-1];
}
function makeOptions(t){
  const same = counties.filter(c=>c.region===t.region && c.fips!==t.fips);
  const distract = shuffle(same.length>=3 ? same : counties.filter(c=>c.fips!==t.fips)).slice(0,3);
  return shuffle([t,...distract]).map(c=>c.name);
}

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S.stats)); }catch(e){} }
function record(fips, correct){
  S.session.correct += correct?1:0; S.session.total += 1;
  const s = S.stats[fips] || {c:0,w:0,streak:0};
  S.stats[fips] = correct ? {c:s.c+1,w:s.w,streak:(s.streak||0)+1} : {c:s.c,w:s.w+1,streak:0};
  save();
}

function fillFor(c){
  if(S.feedback){
    if(S.mode==="find"){ if(S.feedback.clicked===c.fips) return S.feedback.status==="correct"?C_COR:C_WRONG; if(S.reveal===c.fips) return C_ACCENT; }
    if((S.mode==="identify"||S.mode==="recall") && S.target && c.fips===S.target.fips) return S.feedback.status==="correct"?C_COR:C_WRONG;
  }
  if((S.mode==="identify"||S.mode==="recall") && S.target && c.fips===S.target.fips && !S.feedback) return C_ACCENT;
  if(S.mode==="explore"){
    const base = REGION_COLORS[c.region];
    if(!inScope(c)) return C_DIM;
    if(S.pinned===c.fips || S.hovered===c.fips) return lighten(base,0.32);
    return base;
  }
  if(!inScope(c)) return C_DIM;
  const s = S.stats[c.fips];
  if(!s || s.c+s.w===0) return S.hovered===c.fips ? lighten(C_UNSEEN,0.5) : C_UNSEEN;
  const m = (s.streak||0)>=MASTER_STREAK ? C_MASTER : C_LEARN;
  return S.hovered===c.fips ? lighten(m,0.25) : m;
}

function updateCounty(c){
  const el = els[c.fips]; if(!el) return;
  const scoped = inScope(c);
  const isTarget = (S.mode==="identify"||S.mode==="recall") && S.target && c.fips===S.target.fips;
  el.setAttribute("fill", fillFor(c));
  el.setAttribute("stroke", (isTarget || S.hovered===c.fips) ? "#F4D9BE" : "#15110D");
  el.setAttribute("stroke-width", isTarget ? 1.6 : 0.5);
  el.classList.toggle("dim", !scoped);
  const clickable = S.mode==="explore" || (S.mode==="find" && scoped && !S.feedback);
  el.classList.toggle("clickable", clickable);
  el.classList.toggle("ring", isTarget && !S.feedback);
}
function updateMap(){ counties.forEach(updateCounty); }

function labelList(){
  const out = [];
  if(S.mode==="explore"){ if(S.hovered) out.push(S.hovered); if(S.pinned && S.pinned!==S.hovered) out.push(S.pinned); }
  if(S.feedback && S.target){ out.push(S.target.fips); if(S.mode==="find" && S.feedback.clicked && S.feedback.clicked!==S.target.fips) out.push(S.feedback.clicked); }
  return [...new Set(out)];
}
function renderLabels(){
  while(labelG.firstChild) labelG.removeChild(labelG.firstChild);
  if(!(S.mode==="explore" || S.feedback)) return;
  labelList().forEach(f=>{
    const c = byFips[f]; if(!c) return;
    const t = document.createElementNS(SVGNS,"text");
    t.setAttribute("class","tct-lab"); t.setAttribute("x",c.cx); t.setAttribute("y",c.cy); t.setAttribute("text-anchor","middle");
    t.textContent = c.name; labelG.appendChild(t);
  });
}

function renderProgress(){ const m=masteredCount(); progNum.innerHTML = "<b>"+m+"</b> / 254 mastered"; progBar.style.width = (m/254*100)+"%"; }
function renderModes(){ [...modesEl.children].forEach(b=>b.classList.toggle("on", b.dataset.mode===S.mode)); }

function renderChips(){
  const prog = {}; REGIONS.forEach(r=>prog[r]={t:0,m:0});
  counties.forEach(c=>{ prog[c.region].t++; if(isMastered(c.fips)) prog[c.region].m++; });
  chipsEl.innerHTML = "";
  const hasSel = S.regions.length>0;
  const mk = (reg, label, dot, count) => {
    const b = document.createElement("button");
    const isAll = reg==="All";
    const on = isAll ? !hasSel : S.regions.includes(reg);
    b.className = "tct-chip" + (on?" on":"");
    const add = (!isAll && hasSel && !on) ? '<span class="add">+</span>' : '';
    const rm = (!isAll && on) ? '<span class="rm">&#10005;</span>' : '';
    b.innerHTML = add + (dot?'<span class="dot" style="background:'+dot+'"></span>':'') + label + ' <span class="ct">'+count+'</span>' + rm;
    b.title = isAll ? 'Show all 254 counties'
      : (on ? 'Remove '+label+' from view' : (hasSel ? 'Add '+label+' to compare borders' : 'Focus on '+label));
    b.onclick = () => setRegion(reg);
    chipsEl.appendChild(b);
  };
  mk("All","All","", masteredCount()+"/254");
  REGIONS.forEach(r=> mk(r, SHORT[r], REGION_COLORS[r], prog[r].m+"/"+prog[r].t));
}

function renderPanel(){
  const acc = S.session.total ? Math.round(S.session.correct/S.session.total*100) : null;
  let html = "";
  if(S.mode==="explore"){
    const info = (S.hovered && byFips[S.hovered]) || (S.pinned && byFips[S.pinned]);
    html += '<div class="tct-card"><div class="tct-eyebrow">Explore mode</div>';
    html += '<div class="tct-prompt" style="font-size:'+(info?30:22)+'px">'+(info?info.name:(isTouch?"Tap to read":"Hover to read"));
    if(info) html += '<small style="color:'+REGION_COLORS[info.region]+'">'+info.region+'</small>';
    html += '</div>';
    if(!info) html += '<p class="tct-explain">'+(isTouch
      ? 'Tap any county to see its name; tap again to clear it. Pick a region above to isolate a chunk — once one\'s selected, tap <b>+</b> on a neighbor to add it and study how they border each other.'
      : 'Hover any county to see its name. Click to pin it. Pick a region above to isolate a chunk — once one\'s selected, click <b>+</b> on a neighbor to add it and study how they border each other.')+'</p>';
    if(S.pinned && byFips[S.pinned]) html += '<div class="tct-pin">pinned: '+byFips[S.pinned].name+'</div>';
    html += '</div>';
    html += '<div class="tct-card"><div class="tct-eyebrow" style="margin-bottom:9px">The 8 study regions</div><div class="tct-legend">';
    REGIONS.forEach(r=> html += '<span><i style="background:'+REGION_COLORS[r]+'"></i> '+SHORT[r]+'</span>');
    html += '</div></div>';
  } else if(S.mode==="find" && S.target){
    html += '<div class="tct-card"><div class="tct-eyebrow">Find on map</div>';
    html += '<div class="tct-prompt">'+S.target.name+'<small>Click this county'+(S.regions.length===0?" anywhere in Texas":"")+'</small></div>';
    if(S.feedback){
      html += '<div class="tct-fb '+S.feedback.status+'">';
      html += S.feedback.status==="correct" ? ('Correct — <b>'+S.target.name+'</b>, '+S.target.region+'.')
        : ('That was '+(byFips[S.feedback.clicked]?byFips[S.feedback.clicked].name:"?")+'. <b>'+S.target.name+'</b> is highlighted.');
      html += '</div>';
    }
    html += '</div>';
    html += statsCard(acc) + legendCard();
  } else if(S.mode==="identify" && S.target){
    html += '<div class="tct-card"><div class="tct-eyebrow">Name the highlighted county</div><div class="tct-opts" id="optBox">';
    S.options.forEach(name=>{
      let cls=""; if(S.feedback){ if(name===S.target.name) cls=" correct"; else if(S.feedback.picked===name) cls=" wrong"; }
      html += '<button class="tct-opt'+cls+'" data-name="'+name.replace(/"/g,'&quot;')+'"'+(S.feedback?" disabled":"")+'>'+name+'</button>';
    });
    html += '</div></div>';
    html += statsCard(acc) + legendCard();
  } else if(S.mode==="recall" && S.target){
    html += '<div class="tct-card"><div class="tct-eyebrow">Type the highlighted county</div>';
    html += '<div class="tct-recall">';
    html += '<input id="typeInput" class="tct-input" type="text" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" placeholder="County name…"'+(S.feedback?' disabled value="'+esc(S.feedback.typed)+'"':'')+'>';
    html += '<button class="tct-submit" id="typeSubmit"'+(S.feedback?' disabled':'')+'>Check</button>';
    html += '</div>';
    if(S.feedback){
      html += '<div class="tct-fb '+S.feedback.status+'">';
      html += S.feedback.status==="correct" ? ('Correct &mdash; <b>'+S.target.name+'</b>, '+S.target.region+'.')
        : ('You typed “'+esc(S.feedback.typed)+'”. It was <b>'+S.target.name+'</b>, '+S.target.region+'.');
      html += '</div>';
    } else {
      html += '<p class="tct-explain" style="margin-top:10px">Capitalization, spaces and punctuation are ignored. Press <b>Enter</b> to check.</p>';
    }
    html += '</div>';
    html += statsCard(acc) + legendCard();
  }
  html += '<button class="tct-reset" id="resetBtn">&#8635; Reset progress</button>';
  panelEl.innerHTML = html;

  const ob = document.getElementById("optBox");
  if(ob) [...ob.children].forEach(b=> b.onclick = ()=> onOption(b.dataset.name));
  const ti = document.getElementById("typeInput");
  if(ti){
    if(!S.feedback) ti.focus();
    ti.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); onType(ti.value); } });
  }
  const ts = document.getElementById("typeSubmit");
  if(ts) ts.onclick = ()=>{ const el=document.getElementById("typeInput"); if(el) onType(el.value); };
  const rb = document.getElementById("resetBtn");
  if(rb) rb.onclick = ()=>{ if(confirm("Reset all mastery progress?")){ S.stats={}; S.session={correct:0,total:0}; save(); updateMap(); renderLabels(); renderChips(); renderProgress(); renderPanel(); } };
}
function statsCard(acc){ return '<div class="tct-stats"><div class="tct-stat"><div class="v">'+S.session.correct+'<small>/'+S.session.total+'</small></div><div class="l">this session</div></div><div class="tct-stat"><div class="v">'+(acc===null?"&mdash;":acc+"%")+'</div><div class="l">accuracy</div></div></div>'; }
function legendCard(){ return '<div class="tct-card" style="padding:13px 16px"><div class="tct-legend"><span><i style="background:'+C_UNSEEN+';border:1px solid #3a3328"></i> unseen</span><span><i style="background:'+C_LEARN+'"></i> learning</span><span><i style="background:'+C_MASTER+'"></i> mastered (3+ streak)</span></div></div>'; }

function onCounty(c){
  if(S.mode==="explore"){ S.pinned = S.pinned===c.fips ? null : c.fips; updateCounty(c); renderLabels(); renderPanel(); return; }
  if(S.mode==="find"){
    if(S.feedback || !S.target) return;
    if(!inScope(c)) return;
    const correct = c.fips===S.target.fips;
    record(S.target.fips, correct);
    S.feedback = {status: correct?"correct":"wrong", clicked:c.fips};
    if(!correct) S.reveal = S.target.fips;
    updateMap(); renderLabels(); renderPanel(); renderChips(); renderProgress();
    clearTimeout(T); T = setTimeout(advance, correct?750:1650);
  }
}
function onOption(name){
  if(S.feedback || !S.target) return;
  const correct = name===S.target.name;
  record(S.target.fips, correct);
  S.feedback = {status: correct?"correct":"wrong", picked:name};
  updateMap(); renderLabels(); renderPanel(); renderChips(); renderProgress();
  clearTimeout(T); T = setTimeout(advance, correct?750:1500);
}
function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }
function esc(s){ return (s||"").replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function onType(val){
  if(S.feedback || !S.target) return;
  if(!val || !val.trim()) return;
  const correct = norm(val)===norm(S.target.name);
  record(S.target.fips, correct);
  S.feedback = {status: correct?"correct":"wrong", typed:val};
  S.reveal = S.target.fips;
  updateMap(); renderLabels(); renderPanel(); renderChips(); renderProgress();
  clearTimeout(T); T = setTimeout(advance, correct?900:1900);
}
function advance(){
  clearTimeout(T); S.feedback=null; S.reveal=null;
  if(S.mode==="explore"){ S.target=null; updateMap(); renderLabels(); renderPanel(); return; }
  const pool = poolFor();
  S.target = pickTarget(pool, S.target && S.target.fips);
  if(S.mode==="identify") S.options = makeOptions(S.target);
  updateMap(); renderLabels(); renderPanel();
}
function setMode(m){
  clearTimeout(T); S.mode=m; S.feedback=null; S.reveal=null; S.hovered=null;
  if(m==="explore"){ S.target=null; }
  else { const pool=poolFor(); S.target=pickTarget(pool,null); if(m==="identify") S.options=makeOptions(S.target); }
  renderModes(); updateMap(); renderLabels(); renderPanel();
}
function setRegion(r){
  clearTimeout(T);
  if(r==="All"){ S.regions=[]; }
  else { const i=S.regions.indexOf(r); if(i>=0) S.regions.splice(i,1); else S.regions.push(r); }
  S.feedback=null; S.reveal=null;
  if(S.mode!=="explore"){ const pool=poolFor(); S.target=pickTarget(pool,null); if(S.mode==="identify") S.options=makeOptions(S.target); }
  renderChips(); updateMap(); renderLabels(); renderPanel();
}

function build(){
  const root = document.getElementById("app");
  root.innerHTML =
    '<div class="tct">'+
      '<div class="tct-head">'+
        '<div class="tct-title"><div class="tct-num">254</div><div class="tct-sub"><h1>Texas County Trainer</h1><p>Learn every county by name &amp; place &mdash; one region at a time</p></div></div>'+
        '<div class="tct-prog"><div class="pn" id="progNum"></div><div class="tct-bar"><i id="progBar"></i></div></div>'+
      '</div>'+
      '<div class="tct-modes" id="modes"></div>'+
      '<div class="tct-chips" id="chips"></div>'+
      '<div class="tct-stage">'+
        '<div class="tct-mapwrap"><svg id="map" role="img" aria-label="Map of Texas counties"></svg></div>'+
        '<div class="tct-panel" id="panel"></div>'+
      '</div>'+
    '</div>';

  modesEl = document.getElementById("modes");
  chipsEl = document.getElementById("chips");
  panelEl = document.getElementById("panel");
  progNum = document.getElementById("progNum");
  progBar = document.getElementById("progBar");

  [["explore","Explore"],["find","Find on map"],["identify","Name it"],["recall","Type it"]].forEach(([m,label])=>{
    const b=document.createElement("button"); b.className="tct-mode"; b.dataset.mode=m; b.textContent=label; b.onclick=()=>setMode(m); modesEl.appendChild(b);
  });

  const svg = document.getElementById("map");
  svg.setAttribute("viewBox", DATA.viewBox);
  counties.forEach(c=>{
    const p = document.createElementNS(SVGNS,"path");
    p.setAttribute("d", c.d); p.dataset.fips=c.fips; p.className.baseVal="tct-co";
    p.addEventListener("click", ()=>onCounty(c));
    if(!isTouch){
      p.addEventListener("mouseenter", ()=>{ if(!inScope(c)) return; const prev=S.hovered; S.hovered=c.fips; if(prev&&byFips[prev]) updateCounty(byFips[prev]); updateCounty(c); renderLabels(); if(S.mode==="explore") renderPanel(); });
      p.addEventListener("mouseleave", ()=>{ if(S.hovered===c.fips){ S.hovered=null; updateCounty(c); renderLabels(); if(S.mode==="explore") renderPanel(); } });
    }
    els[c.fips]=p; svg.appendChild(p);
  });
  labelG = document.createElementNS(SVGNS,"g"); svg.appendChild(labelG);
}

function init(){
  try{ const raw=localStorage.getItem(KEY); if(raw) S.stats=JSON.parse(raw); }catch(e){}
  build(); renderModes(); renderChips(); renderProgress(); updateMap(); renderLabels(); renderPanel();
}
if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", init); else init();

</script>
</body>
</html>
